# Netlify still deploys the import-image app (the original pdf-to-musicxml OMR
# pipeline), which now lives under import-image/ after the monorepo reorg. The
# `base` directory points Netlify at it, so its build, publish dir, and
# functions resolve exactly as before — the deploy is unchanged byte-for-byte.
#
# The editor (editor/) is set up to build (`make build-editor` at the repo
# root) but its deploy is intentionally NOT wired yet: it has not been verified
# in production. To flip the deploy to the editor once it's tested, drop the
# `base` line, set `command = "make build-editor"` and `publish = "editor"`,
# point `[functions]` away (or remove it), and drop the COOP/COEP headers (the
# editor needs no SharedArrayBuffer / cross-origin isolation).
[build]
  base = "import-image"
  command = "make build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  BUN_VERSION = "1"

# ORT Web's threaded WASM backend needs SharedArrayBuffer, which the browser
# only exposes to cross-origin-isolated pages. Mirror the COOP/COEP headers the
# dev server sets (import-image/scripts/serve.ts) so production behaves the same.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

# Netlify deploys the editor (editor/): the WYSIWYG MusicXML editor, whose
# "import from image/PDF" feature runs the OMR pipeline under lib/import-image/.
# `make build-editor` (scripts/build-editor.ts) bundles the editor and the OMR
# worker and stages the ORT WASM + pdf.js worker assets into editor/dist, which
# is the publish (site-root) directory.
[build]
  command = "make build-editor"
  publish = "editor/dist"

[functions]
  # The OMR model weights (~109 MB) are NOT in the static deploy: they are
  # uploaded once, out of band, to Netlify Blobs (`make upload-models`), and this
  # function streams them back same-origin at /models/<file> (required under
  # COEP). The function moved with the pipeline to lib/import-image/.
  directory = "lib/import-image/netlify/functions"

[build.environment]
  BUN_VERSION = "1"

# ORT Web's threaded WASM backend (used by the image/PDF import) needs
# SharedArrayBuffer, which the browser only exposes to cross-origin-isolated
# pages. Mirror the COOP/COEP headers the dev server sets (scripts/serve.ts) so
# production behaves the same.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

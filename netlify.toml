[build]
  # `make stage-models` downloads the ONNX weights (~109 MB) and seeds them into
  # .netlify/blobs/deploy/ so Netlify stores them in the deploy's blob store; the
  # models function (netlify/functions/models.mts) streams them back same-origin
  # at /models/<file> (required under COEP). They are kept out of the static
  # publish directory. `build` then bundles the SPA.
  command = "make stage-models build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  BUN_VERSION = "1"

# ORT Web's threaded WASM backend needs SharedArrayBuffer, which the browser
# only exposes to cross-origin-isolated pages. Mirror the COOP/COEP headers the
# dev server sets (scripts/serve.ts) so production behaves the same.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

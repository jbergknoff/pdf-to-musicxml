services:
  main:
    image: oven/bun:${BUN_VERSION:-1}
    command: echo
    volumes:
      - ${PWD}:${PWD}
    working_dir: ${PWD}

  server:
    image: oven/bun:${BUN_VERSION:-1}
    command: bun scripts/serve.ts
    volumes:
      - ${PWD}:${PWD}
    ports:
      - "3456:3456"
    working_dir: ${PWD}
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3456').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    command: echo
    volumes:
      - ${PWD}:${PWD}
    working_dir: ${PWD}
    environment:
      - BASE_URL=http://server:3456
    depends_on:
      server:
        condition: service_healthy

  # One-off: optimize the downloaded ONNX weights with onnxsim (run via
  # `make optimize-models`). Uses a Python image because onnx/onnxsim/onnxruntime
  # are Python tools; the deps are pip-installed at run time so nothing is
  # installed on the host. PIP_CACHE_DIR points at a repo-local folder so repeat
  # runs skip the re-download.
  python:
    # 3.11, not 3.12: onnxsim ships manylinux wheels for cp311 but not cp312, so
    # 3.12 would fall back to a from-source build (needs cmake) and fail.
    image: python:3.11-slim
    command: echo
    volumes:
      - ${PWD}:${PWD}
    working_dir: ${PWD}
    environment:
      - PIP_CACHE_DIR=${PWD}/.pip-cache

  # One-off: upload the model weights to Netlify Blobs with the Netlify CLI (run
  # via `make upload-models`). Uses a Node image so `npx netlify-cli` works
  # without installing anything on the host. The env vars are passed through from
  # the host shell.
  netlify-cli:
    image: node:22-slim
    command: echo
    volumes:
      - ${PWD}:${PWD}
    working_dir: ${PWD}
    environment:
      - NETLIFY_AUTH_TOKEN
      - NETLIFY_SITE_ID
      - NETLIFY_CLI_VERSION

[build]
  # The model weights are NOT handled by the build. They are uploaded once, out
  # of band, to Netlify Blobs with the Netlify CLI (`make upload-models`); the
  # models function (netlify/functions/models.mts) streams them back same-origin
  # at /models/<file> (required under COEP). Deploy-time upload of the ~109 MB
  # was too slow.
  command = "make build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  BUN_VERSION = "1"

# ORT Web's threaded WASM backend needs SharedArrayBuffer, which the browser
# only exposes to cross-origin-isolated pages. Mirror the COOP/COEP headers the
# dev server sets (scripts/serve.ts) so production behaves the same.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

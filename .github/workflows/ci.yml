name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull Docker images
        run: docker compose pull --quiet main
      - name: Build and test
        run: make pr-ready
      - run: git diff --exit-code
      - run: make down
